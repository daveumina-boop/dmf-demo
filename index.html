<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMF Feed</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.slide {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 20px;
  left: 16px;
  right: 16px;
  color: white;
}

.restaurant {
  font-size: 22px;
  font-weight: bold;
}

.desc {
  font-size: 14px;
  opacity: 0.9;
}

.order-btn {
  margin-top: 10px;
  background: red;
  padding: 14px;
  text-align: center;
  border-radius: 12px;
  font-weight: bold;
  text-decoration: none;
  color: white;
  display: block;
}
</style>
</head>

<body>

<div class="feed">

  <!-- BBQ -->
  <div class="slide">
    <video src="bbq.mp4" autoplay muted loop playsinline></video>

    <div class="overlay">
      <div class="restaurant">🔥 Real Smoq'ed BBQ</div>
      <div class="desc">Brisket. Ribs. Real smoke.</div>

      <a href="https://realsmoqedbbq.com/menu" target="_blank" class="order-btn">
        Order Now
      </a>
    </div>
  </div>

  <!-- PIZZAZZ -->
  <div class="slide">
    <video src="pizzazz.mp4" autoplay muted loop playsinline></video>

    <div class="overlay">
      <div class="restaurant">🍕 Pizzazz on the Circle</div>
      <div class="desc">Pizza. Pasta. Downtown flavor.</div>

      <a href="https://order.toasttab.com/online/pizzazz-on-the-circle#!/" target="_blank" class="order-btn">
        Order Now
      </a>
    </div>
  </div>

</div>

</body>
</html>
