<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DMF Demo</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, Arial, sans-serif;
}

/* FEED */
.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
}

/* SLIDE */
.slide {
  position: relative;
  height: 100vh;
  scroll-snap-align: start;
}

/* VIDEO */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* FADE */
.fade {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* TEXT */
.info {
  position: absolute;
  bottom: 110px;
  left: 16px;
  right: 16px;
  color: white;
}

.info h2 {
  margin: 0;
  font-size: 24px;
}

.info p {
  margin-top: 6px;
  font-size: 15px;
  opacity: 0.9;
}

/* ORDER BUTTON */
.order-btn {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: calc(20px + env(safe-area-inset-bottom));
  background: linear-gradient(90deg, #ff3b30, #d10000);
  color: white;
  padding: 18px;
  text-align: center;
  font-weight: bold;
  border-radius: 14px;
  font-size: 18px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="feed" id="feed">

  <!-- BBQ -->
  <div class="slide">
    <video src="bbq.mp4?v=10" muted loop playsinline preload="auto"></video>
    <div class="fade"></div>

    <div class="info">
      <h2>Real Smoq'ed BBQ</h2>
      <p>Ribs • Brisket • BBQ</p>
    </div>

    <a href="https://realsmoqedbbq.com/menu" target="_blank" class="order-btn">
      ORDER NOW
    </a>
  </div>

  <!-- PIZZAZZ -->
  <div class="slide">
    <video src="pizzazz.mp4?v=10" muted loop playsinline preload="auto"></video>
    <div class="fade"></div>

    <div class="info">
      <h2>Pizzazz on the Circle</h2>
      <p>Pizza • Pasta • Italian</p>
    </div>

    <a href="https://order.toasttab.com/online/pizzazz-on-the-circle#!/" target="_blank" class="order-btn">
      ORDER NOW
    </a>
  </div>

</div>

<script>
const videos = document.querySelectorAll("video");

/* ONLY PLAY VISIBLE VIDEO */
function updatePlayback() {
  videos.forEach(video => {
    const rect = video.getBoundingClientRect();
    const center = window.innerHeight / 2;

    const isActive = rect.top < center && rect.bottom > center;

    if (isActive) {
      video.play().catch(() => {});
    } else {
      video.pause();
      video.currentTime = 0;
    }
  });
}

/* INITIAL */
window.addEventListener("load", () => {
  updatePlayback();
});

/* SCROLL */
document.getElementById("feed").addEventListener("scroll", () => {
  updatePlayback();
});

/* TAP FOR SOUND */
videos.forEach(video => {
  video.addEventListener("click", () => {
    videos.forEach(v => v.muted = true);
    video.muted = false;
    video.play();
  });
});
</script>

</body>
</html>
