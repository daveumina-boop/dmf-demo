<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>DMF Feed</title>

<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  /* FEED */
  .feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }

  .slide {
    position: relative;
    height: 100vh;
    width: 100%;
    scroll-snap-align: start;
    background: #000;
  }

  /* VIDEO (don’t touch this — keeps it perfect) */
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* TOP BAR */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 14px 16px;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    color: #fff;
    font-weight: 800;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    pointer-events: none;
  }

  .pill {
    pointer-events: auto;
    background: rgba(0,0,0,0.5);
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px;
  }

  /* FADE */
  .fade {
    position: absolute;
    bottom: 0;
    height: 45%;
    width: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    pointer-events: none;
  }

  /* RIGHT ACTIONS */
  .actions {
    position: absolute;
    right: 12px;
    bottom: 150px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    z-index: 10;
    color: white;
    text-align: center;
    font-size: 12px;
  }

  .btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  /* TEXT INFO */
  .info {
    position: absolute;
    bottom: 140px;
    left: 16px;
    right: 90px;
    color: white;
    z-index: 10;
  }

  .info h2 {
    margin: 0 0 6px;
    font-size: 22px;
  }

  .info p {
    margin: 0;
    font-size: 14px;
    opacity: 0.9;
  }

  /* 🔴 ORDER BUTTON (THIS IS FIXED CLEAN) */
  .order-btn {
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: calc(16px + env(safe-area-inset-bottom));
    z-index: 10;

    background: linear-gradient(90deg, #ff3b30, #d10000);
    color: #fff;
    padding: 18px;
    border-radius: 16px;
    text-align: center;
    font-weight: 900;
    font-size: 18px;
    text-decoration: none;
  }

  /* SOUND HINT */
  .sound {
    position: absolute;
    top: 70px;
    left: 16px;
    z-index: 10;
    font-size: 12px;
    background: rgba(0,0,0,0.4);
    padding: 6px 10px;
    border-radius: 999px;
  }

</style>
</head>

<body>

<div class="topbar">
  <div class="pill">DMF</div>
  <div class="pill">Discover → Order Direct</div>
</div>

<div class="feed">

  <!-- BBQ -->
  <div class="slide">
    <video src="bbq.mp4" autoplay muted loop playsinline onclick="this.muted=false"></video>

    <div class="fade"></div>
    <div class="sound">🔊 tap for sound</div>

    <div class="actions">
      <div>❤️<br>1.2K</div>
      <div>💬<br>184</div>
      <div>🔖<br>Save</div>
    </div>

    <div class="info">
      <h2>Real Smoq'ed BBQ</h2>
      <p>Brisket • Ribs • Real smoke</p>
    </div>

    <a href="https://realsmoqedbbq.com/menu" target="_blank" class="order-btn">
      ORDER NOW
    </a>
  </div>

  <!-- PIZZAZZ -->
  <div class="slide">
    <video src="pizzazz.mp4" autoplay muted loop playsinline onclick="this.muted=false"></video>

    <div class="fade"></div>
    <div class="sound">🔊 tap for sound</div>

    <div class="actions">
      <div>❤️<br>986</div>
      <div>💬<br>127</div>
      <div>🔖<br>Save</div>
    </div>

    <div class="info">
      <h2>Pizzazz on the Circle</h2>
      <p>Pizza • Pasta • Italian</p>
    </div>

    <a href="https://order.toasttab.com/online/pizzazz-on-the-circle#!/" target="_blank" class="order-btn">
      ORDER NOW
    </a>
  </div>

</div>

</body>
</html>
