<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* FEED */
.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

/* SLIDE */
.slide {
  position: relative;
  height: 100vh;
  scroll-snap-align: start;
}

/* VIDEO */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* FADE */
.fade {
  position: absolute;
  bottom: 0;
  height: 45%;
  width: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* TEXT */
.info {
  position: absolute;
  bottom: 150px;
  left: 16px;
  color: white;
}

.info h2 {
  margin: 0;
  font-size: 24px;
}

.info p {
  margin-top: 6px;
  font-size: 16px;
}

/* ACTION ICONS */
.actions {
  position: absolute;
  right: 18px;
  bottom: 200px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.actions div {
  font-size: 34px;
  filter: drop-shadow(0 0 6px rgba(0,0,0,0.6));
}

/* ORDER BUTTON */
.order-btn {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: calc(90px + env(safe-area-inset-bottom));
  background: linear-gradient(90deg, #ff3b30, #d10000);
  color: white;
  padding: 20px;
  text-align: center;
  font-weight: bold;
  border-radius: 16px;
  font-size: 20px;
  z-index: 20;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #5a0a00;
  display: flex;
  justify-content: space-around;
  padding: 14px 0;
  color: white;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="feed" id="feed">

  <!-- BBQ -->
  <div class="slide">
    <video src="bbq.mp4?v=5" muted loop playsinline preload="auto"></video>

    <div class="fade"></div>

    <div class="actions">
      <div>❤️</div>
      <div>💬</div>
      <div>🔗</div>
      <div>🔖</div>
    </div>

    <div class="info">
      <h2>Real Smoq'ed BBQ</h2>
      <p>Ribs • Brisket • BBQ</p>
    </div>

    <a href="https://realsmoqedbbq.com/menu" target="_blank" class="order-btn">
      ORDER NOW
    </a>
  </div>

  <!-- PIZZAZZ -->
  <div class="slide">
    <video src="pizzazz.mp4?v=5" muted loop playsinline preload="auto"></video>

    <div class="fade"></div>

    <div class="actions">
      <div>❤️</div>
      <div>💬</div>
      <div>🔗</div>
      <div>🔖</div>
    </div>

    <div class="info">
      <h2>Pizzazz on the Circle</h2>
      <p>Pizza • Pasta • Italian</p>
    </div>

    <a href="https://order.toasttab.com/online/pizzazz-on-the-circle#!/" target="_blank" class="order-btn">
      ORDER NOW
    </a>
  </div>

</div>

<div class="nav">
  <div>🏠</div>
  <div>⭐</div>
  <div>📦</div>
  <div>👤</div>
</div>

<script>
const videos = document.querySelectorAll("video");
const feed = document.getElementById("feed");

/* PLAY ACTIVE VIDEO */
function playVisibleVideo() {
  let active = null;
  let closest = Infinity;

  videos.forEach(video => {
    const rect = video.getBoundingClientRect();
    const offset = Math.abs(rect.top);

    if (offset < closest) {
      closest = offset;
      active = video;
    }
  });

  videos.forEach(v => {
    if (v !== active) {
      v.pause();
      v.muted = true;
    }
  });

  if (active) {
    active.play().catch(() => {});
  }
}

/* INITIAL PLAY */
window.addEventListener("load", () => {
  videos.forEach(v => {
    v.muted = true;
    v.play().catch(() => {});
  });
});

/* SCROLL HANDLING */
feed.addEventListener("scroll", () => {
  playVisibleVideo();
});

/* TAP FOR SOUND */
videos.forEach(video => {
  video.addEventListener("click", () => {
    videos.forEach(v => v.muted = true);
    video.muted = false;
    video.play();
  });
});
</script>

</body>
</html>
