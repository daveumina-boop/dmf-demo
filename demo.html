<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

.container {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.video-slide {
  position: relative;
  height: 100vh;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Overlay Info */
.info {
  position: absolute;
  bottom: 100px;
  left: 15px;
}

.info h3 {
  margin: 0;
}

.info p {
  margin: 5px 0;
  font-size: 14px;
}

/* Right Buttons */
.actions {
  position: absolute;
  right: 10px;
  bottom: 120px;
  text-align: center;
}

.actions div {
  margin: 15px 0;
  font-size: 22px;
}

/* Order Button */
.order-btn {
  position: absolute;
  bottom: 30px;
  left: 20px;
  right: 20px;
  background: red;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  border-radius: 10px;
}

/* Top Bar */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  text-align: center;
  padding: 10px;
  font-weight: bold;
  background: rgba(0,0,0,0.4);
}

/* Bottom Nav */
.bottombar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.6);
  padding: 10px 0;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="topbar">
  DMF | For You
</div>

<div class="container">

  <!-- BBQ -->
  <div class="video-slide">
    <video src="bbq.mp4" autoplay muted loop></video>

    <div class="info">
      <h3>Real Smoqed BBQ</h3>
      <p>🔥 Smoked Ribs • Brisket • BBQ</p>
    </div>

    <div class="actions">
      ❤️<br>
      💬<br>
      🔗<br>
      🔖
    </div>

    <div class="order-btn" onclick="window.location.href='https://realsmoqedbbq.com/menu'">
      ORDER NOW
    </div>
  </div>

  <!-- PIZZAZZ -->
  <div class="video-slide">
    <video src="pizzazz.mp4" autoplay muted loop></video>

    <div class="info">
      <h3>Pizzazz on the Circle</h3>
      <p>🍕 Pizza • Pasta • Italian</p>
    </div>

    <div class="actions">
      ❤️<br>
      💬<br>
      🔗<br>
      🔖
    </div>

    <div class="order-btn" onclick="window.location.href='https://pizzazzonthecircle.com'">
      ORDER NOW
    </div>
  </div>

</div>

<div class="bottombar">
  <div>🏠 Home</div>
  <div>⭐ Favorites</div>
  <div>📦 Orders</div>
  <div>👤 Profile</div>
</div>

</body>
</html>
