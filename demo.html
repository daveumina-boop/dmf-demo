<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DMF Feed</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* FEED */
.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.slide {
  position: relative;
  height: 100vh;
  scroll-snap-align: start;
}

/* VIDEO */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* FADE */
.fade {
  position: absolute;
  bottom: 0;
  height: 45%;
  width: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* TEXT */
.info {
  position: absolute;
  bottom: 140px;
  left: 16px;
  color: white;
}

.info h2 {
  margin: 0;
  font-size: 22px;
}

.info p {
  margin-top: 5px;
  font-size: 14px;
}

/* ACTION ICONS */
.actions {
  position: absolute;
  right: 12px;
  bottom: 180px;
  color: white;
  text-align: center;
}

.actions div {
  margin: 18px 0;
  font-size: 30px;
}

/* ORDER BUTTON */
.order-btn {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: calc(90px + env(safe-area-inset-bottom));
  background: linear-gradient(90deg, #ff3b30, #d10000);
  color: white;
  padding: 18px;
  text-align: center;
  font-weight: bold;
  border-radius: 14px;
  font-size: 18px;
  z-index: 20;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #5a0a00;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  color: white;
}

/* SOUND */
.sound {
  position: absolute;
  top: 70px;
  left: 16px;
  color: white;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="feed">

  <!-- BBQ -->
  <div class="slide">
    <video src="bbq.mp4?v=2" autoplay muted loop playsinline preload="auto"
      onclick="this.muted=false; this.play();"></video>

    <div class="fade"></div>
    <div class="sound">🔊 tap for sound</div>

    <div class="actions">
      <div>❤️</div>
      <div>💬</div>
      <div>🔗</div>
      <div>🔖</div>
    </div>

    <div class="info">
      <h2>Real Smoq'ed BBQ</h2>
      <p>Ribs • Brisket • BBQ</p>
    </div>

    <a href="https://realsmoqedbbq.com/menu" target="_blank" class="order-btn">
      ORDER NOW
    </a>
  </div>

  <!-- PIZZAZZ -->
  <div class="slide">
    <video src="pizzazz.mp4?v=2" autoplay muted loop playsinline preload="auto"
      onclick="this.muted=false; this.play();"></video>

    <div class="fade"></div>
    <div class="sound">🔊 tap for sound</div>

    <div class="actions">
      <div>❤️</div>
      <div>💬</div>
      <div>🔗</div>
      <div>🔖</div>
    </div>

    <div class="info">
      <h2>Pizzazz on the Circle</h2>
      <p>Pizza • Pasta • Italian</p>
    </div>

    <a href="https://order.toasttab.com/online/pizzazz-on-the-circle#!/" target="_blank" class="order-btn">
      ORDER NOW
    </a>
  </div>

</div>

<div class="nav">
  <div>🏠</div>
  <div>⭐</div>
  <div>📦</div>
  <div>👤</div>
</div>

</body>
</html>
